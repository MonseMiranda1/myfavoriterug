spring:
  config:
    import: optional:file:.env[.properties]

  application:
    name: backend
    
  servlet:
    multipart:
      max-file-size: 8MB
      max-request-size: 32MB

  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/myfavoriterug}
    username: ${DATABASE_USERNAME:postgres}
    password: ${DATABASE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: ${JPA_SHOW_SQL:false}
    properties:
      hibernate:
        format_sql: true

server:
  forward-headers-strategy: framework

cloudinary:
  cloud-name: ${CLOUDINARY_CLOUD_NAME:}
  api-key: ${CLOUDINARY_API_KEY:}
  api-secret: ${CLOUDINARY_API_SECRET:}
  product-folder: ${CLOUDINARY_PRODUCT_FOLDER:myfavoriterug/products}
  review-folder: ${CLOUDINARY_REVIEW_FOLDER:myfavoriterug/reviews}

app:
  frontend-base-url: ${FRONTEND_BASE_URL:http://localhost:5173}
  frontend-allowed-origin-patterns: ${FRONTEND_ALLOWED_ORIGIN_PATTERNS:}
  backend-base-url: ${BACKEND_BASE_URL:http://localhost:8080}
  upload-dir: ${UPLOAD_DIR:uploads/product-images}
  review-upload-dir: ${REVIEW_UPLOAD_DIR:uploads/review-images}
  admin:
    username: ${ADMIN_USERNAME:admin}
    password: ${ADMIN_PASSWORD:change-me-before-production}
  flow:
    api-url: ${FLOW_API_URL:https://sandbox.flow.cl/api}
    api-key: ${FLOW_API_KEY:}
    secret-key: ${FLOW_SECRET_KEY:}
